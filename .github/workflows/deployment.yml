name: Deployment
description: Deploys the application to the specified environment
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      shell:
        description: "Shell to use for running the steps (e.g., bash, pwsh)"
        required: false
        type: string
        default: "bash"

jobs:
  Build-and-Push:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{secrets.TAILSCALE_OAUTH_CLIENT_SECRET}}
          tags: tag:ci

      - name: Login to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASS }}

      - name: Setup .NET SDK and Tools
        uses: ./.github/actions/dotnet-setup
        with:
          dotnet-version: 10.0.x
          shell: ${{ inputs.shell }}

      - name: Restore and Build Solution
        uses: ./.github/actions/dotnet-steps
        with:
          solution-file: ./src/CCP.slnx
          configuration: Release
          shell: ${{ inputs.shell }}

      - name: Publish the solution
        run: dotnet publish ./src/CCP.slnx -t:PublishContainer  --configuration Release --no-restore  -p Registry=${{ secrets.REGISTRY_HOST }}

      - name: Build Custom Images
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/keycloak/dockerfile
          push: true
          tags: ${{ secrets.REGISTRY_HOST }}/keycloak:latest

      - name: Docker Push Images
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/identityservice-api:latest
            ${{ secrets.REGISTRY_HOST }}/customerservice-api:latest
            ${{ secrets.REGISTRY_HOST }}/chatservice-api:latest
            ${{ secrets.REGISTRY_HOST }}/emailservice-api:latest
            ${{ secrets.REGISTRY_HOST }}/messagingservice-api:latest
            ${{ secrets.REGISTRY_HOST }}/ticketservice-api:latest
            ${{ secrets.REGISTRY_HOST }}/ccp-ui:latest
            ${{ secrets.REGISTRY_HOST }}/ccp-website:latest
            
